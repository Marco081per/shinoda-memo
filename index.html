<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>超シノダメモ v3</title>
  <link rel="manifest" href="./manifest.json">

  <style>
/* ===== デザイン ===== */
body {
  font-family: "Consolas", "Courier New", monospace;
  margin: 0;
  padding: 20px;
  background: radial-gradient(circle at 20% 20%, #0a0f14, #000);
  color: #c9d1d9;
}

.status-bar {
  background: #0d1117;
  color: #58a6ff;
  font-weight: bold;
  padding: 8px 12px;
  border: 2px solid #30363d;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  box-shadow: 0 0 10px rgba(88,166,255,0.4);
  margin-bottom: 20px;
  opacity: 0;
  transform: translateY(-20px) scale(0.95);
  animation: boot-seq 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.led {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: radial-gradient(circle, #58a6ff 40%, #003366 100%);
  box-shadow: 0 0 8px rgba(88,166,255,0.8);
  animation: blink 0.4s infinite alternate;
}

@keyframes blink {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

@keyframes boot-seq {
  0% { opacity: 0; transform: translateY(-20px) scale(0.95); filter: blur(4px); }
  40% { opacity: 1; transform: translateY(0) scale(1.02); filter: blur(0); }
  70% { opacity: 1; transform: translateY(0) scale(0.98); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

h2 {
  color: #58a6ff;
  border-left: 4px solid #58a6ff;
  padding-left: 8px;
  margin-bottom: 15px;
  text-shadow: 0 0 8px rgba(88, 166, 255, 0.7);
}

textarea {
  width: 100%;
  height: 150px;
  padding: 12px;
  border-radius: 6px;
  border: 2px solid #30363d;
  background: #0d1117;
  color: #c9d1d9;
  font-size: 15px;
  box-sizing: border-box;
  outline: none;
  transition: 0.2s;
  box-shadow: inset 0 0 10px rgba(88, 166, 255, 0.1);
}

textarea:focus {
  border-color: #58a6ff;
  box-shadow: 0 0 12px rgba(88, 166, 255, 0.6);
}

button {
  margin-top: 10px;
  padding: 12px 20px;
  background: linear-gradient(180deg, #161b22 0%, #0d1117 100%);
  color: #58a6ff;
  border: 2px solid #58a6ff;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
  text-shadow: 0 0 6px rgba(88,166,255,0.8);
  box-shadow: 0 0 10px rgba(88,166,255,0.4);
  width: 100%;
}

button:hover {
  background: #58a6ff;
  color: #0d1117;
  box-shadow: 0 0 20px rgba(88,166,255,0.8);
}

/* ===== メモカード ===== */
.memo-card {
  background: #0d1117;
  padding: 15px;
  margin: 10px 0;
  border-radius: 6px;
  border: 2px solid #30363d;
  box-shadow: 0 0 10px rgba(0,0,0,0.6);
  position: relative;
}

/* 角の六角形（4つ） */
.memo-card .hex-tl,
.memo-card .hex-tr,
.memo-card .hex-bl,
.memo-card .hex-br {
  content: "";
  position: absolute;
  width: 12px;
  height: 12px;
  background: conic-gradient(from 45deg, #666 0deg 90deg, #222 90deg 180deg, #666 180deg 270deg, #222 270deg 360deg);
  border-radius: 3px;
  box-shadow: inset 0 0 2px #000;
}

.memo-card .hex-tl { top: 6px; left: 6px; }
.memo-card .hex-tr { top: 6px; right: 6px; }
.memo-card .hex-bl { bottom: 6px; left: 6px; }
.memo-card .hex-br { bottom: 6px; right: 6px; }
/* ボタン横並び */
.btn-row {
  display: flex;
  gap: 8px;
  margin-top: 10px;
  align-items: center;
}
/* カード全体を包む */
.memo-wrap {
  margin-bottom: 20px;
}

/* カード外の操作バー */
.memo-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

/* MEMO番号（外側用） */
.memo-tag {
  padding: 6px 12px;
  background: #161b22;
  border: 2px solid #58a6ff;
  color: #58a6ff;
  border-radius: 6px;
  font-size: 14px;
  text-shadow: 0 0 6px rgba(88,166,255,0.8);
  box-shadow: 0 0 10px rgba(88,166,255,0.4);
}

/* 編集・削除ボタン（外側用） */
.memo-btn {
  padding: 6px 12px;
  background: #161b22;
  border: 2px solid #30363d;
  color: #ff6b6b;
  border-radius: 6px;
  cursor: pointer;
  text-shadow: 0 0 6px rgba(255,107,107,0.8);
}

.memo-btn:hover {
  background: #21262d;
  border-color: #ff6b6b;
  box-shadow: 0 0 10px rgba(255,107,107,0.6);
}

/* MEMO番号をボタン風に */
.memo-tag {
  padding: 6px 12px;
  background: #161b22;
  border: 2px solid #58a6ff;
  color: #58a6ff;
  border-radius: 6px;
  font-size: 14px;
  text-shadow: 0 0 6px rgba(88,166,255,0.8);
  box-shadow: 0 0 10px rgba(88,166,255,0.4);
}

/* MEMO番号 */
.memo-number {
  position: absolute;
  top: 4px;
  left: 24px;
  color: #58a6ff;
  font-size: 12px;
  opacity: 0.8;
  text-shadow: 0 0 6px rgba(88,166,255,0.6);
}

.memo-card button {
  margin-top: 8px;
  background: #161b22;
  border: 2px solid #30363d;
  color: #ff6b6b;
  text-shadow: 0 0 6px rgba(255, 107, 107, 0.8);
}
.memo-card button {
  width: auto;
  padding: 6px 12px;
}

.memo-card button:hover {
  background: #21262d;
  border-color: #ff6b6b;
  box-shadow: 0 0 10px rgba(255, 107, 107, 0.6);
}

/* ===== 検索・並び替え ===== */
.control-bar {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.control-bar input {
  flex: 1;
  padding: 10px;
  background: #0d1117;
  border: 2px solid #30363d;
  border-radius: 6px;
  color: #c9d1d9;
}

.sort-btn {
  padding: 10px;
  background: #161b22;
  border: 2px solid #58a6ff;
  color: #58a6ff;
  border-radius: 6px;
  cursor: pointer;
}

/* ===== スマホ ===== */
@media (max-width: 600px) {
  body { padding: 12px; }
  textarea { height: 120px; }
  .control-bar { flex-direction: column; }
}
  </style>
</head>

<body>

<div class="status-bar">
  <span class="led"></span> <span id="statusText">BOOTING...</span>
</div>

<h2>メモを追加しろこの野郎</h2>

<div class="control-bar">
  <input id="searchInput" placeholder="検索（リアルタイム）">
  <button class="sort-btn" id="sortBtn">新しい順</button>
</div>

<textarea id="memoInput" placeholder="ここにメモを書く"></textarea>
<button id="saveBtn">保存</button>

<h2>保存したメモ</h2>
<div id="memoList"></div>

<script>
let memos = JSON.parse(localStorage.getItem("memos")) || [];
let editIndex = null;
let sortNewFirst = true;

const memoInput = document.getElementById("memoInput");
const saveBtn = document.getElementById("saveBtn");
const searchInput = document.getElementById("searchInput");
const sortBtn = document.getElementById("sortBtn");
const memoList = document.getElementById("memoList");

/* ===== 自動保存 ===== */
memoInput.addEventListener("input", () => {
  if (editIndex !== null) {
    memos[editIndex].text = memoInput.value;
    localStorage.setItem("memos", JSON.stringify(memos));
    renderMemos();
  }
});

/* ===== 保存 or 更新 ===== */
saveBtn.addEventListener("click", () => {
  const text = memoInput.value.trim();
  if (!text) return;

  if (editIndex !== null) {
    memos[editIndex].text = text;
    memos[editIndex].date = new Date().toLocaleString();
    editIndex = null;
    saveBtn.textContent = "保存";
  } else {
    memos.push({
      text,
      date: new Date().toLocaleString()
    });
  }

  memoInput.value = "";
  localStorage.setItem("memos", JSON.stringify(memos));
  renderMemos();
});

/* ===== 検索 ===== */
searchInput.addEventListener("input", renderMemos);

/* ===== 並び替え ===== */
sortBtn.addEventListener("click", () => {
  sortNewFirst = !sortNewFirst;
  sortBtn.textContent = sortNewFirst ? "新しい順" : "古い順";
  renderMemos();
});

/* ===== メモ表示（完全版） ===== */
function renderMemos() {
  memoList.innerHTML = "";

  let filtered = memos
    .map((m, i) => ({ ...m, realIndex: i }))
    .filter(m => m.text.includes(searchInput.value));

  filtered.sort((a, b) => {
    return sortNewFirst
      ? new Date(b.date) - new Date(a.date)
      : new Date(a.date) - new Date(b.date);
  });

filtered.forEach((memo, index) => {
  const wrap = document.createElement("div");
  wrap.className = "memo-wrap";

  const memoNumber = String(memo.realIndex + 1).padStart(3, "0");

  wrap.innerHTML = `
    <div class="memo-header">
      <span class="memo-tag">MEMO ${memoNumber}</span>
      <button class="memo-btn" onclick="editMemo(${memo.realIndex})">編集</button>
      <button class="memo-btn" onclick="deleteMemo(${memo.realIndex})">削除</button>
    </div>

    <div class="memo-card">
      <div class="hex-tl"></div>
      <div class="hex-tr"></div>
      <div class="hex-bl"></div>
      <div class="hex-br"></div>

      <p>${memo.text}</p>
      <small>${memo.date}</small>
    </div>
  `;

  memoList.appendChild(wrap);
});

}

/* ===== 編集 ===== */
function editMemo(index) {
  memoInput.value = memos[index].text;
  editIndex = index;
  saveBtn.textContent = "更新";
}

/* ===== 削除 ===== */
function deleteMemo(index) {
  memos.splice(index, 1);
  localStorage.setItem("memos", JSON.stringify(memos));
  renderMemos();
  editIndex = null;
}

/* ===== 起動アニメ ===== */
setTimeout(() => {
  document.getElementById("statusText").textContent = "SYSTEM ONLINE";
}, 1500);

renderMemos();
</script>

</body>
</html>
